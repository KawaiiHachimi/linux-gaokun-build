name: Validate Repository

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    env:
      GAOKUN_DIR: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install validation dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y python3 python3-yaml

      - name: Run repository validation
        run: |
          set -euxo pipefail
          scripts/ci/10_validate_repo.sh
